<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple To-Do List</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 20px; }
        #todo-input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .todo-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #eee; }
        .done span { text-decoration: line-through; color: #999; }
        button { background: none; border: none; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <h1>📝 To-Do List</h1>
    <input type="text" id="todo-input" placeholder="Add a new task...">
    <div id="todo-container"></div>
    
    <script src="app.js"></script>
</body>
</html>
